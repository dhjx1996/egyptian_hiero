# Fine-tune One-DM on the 'hiero' symbol dataset (built by prep_dataset.py).
# Entry point: train.py --one_dm model_zoo/One-DM-ckpt.pt (recon + writer-NCE losses;
# train_finetune.py is NOT used -- its frozen OCR/CTC loss is Latin-specific).
OUTPUT_DIR: Saved/hiero
MODEL:
  STYLE_ENCODER_LAYERS: 3
  NUM_IMGS: 15
  IN_CHANNELS: 4
  OUT_CHANNELS: 4
  NUM_RES_BLOCKS: 1
  NUM_HEADS: 4
  EMB_DIM: 512
SOLVER:
  BASE_LR: 5e-05
  EPOCHS: 200
  WARMUP_ITERS: 20000
  TYPE: AdamW
  GRAD_L2_CLIP: 5.0
TRAIN:
  TYPE: train
  IMS_PER_BATCH: 96
  SNAPSHOT_BEGIN: 0            # epochs (train.py path snapshots per-epoch)
  SNAPSHOT_ITERS: 10
  VALIDATE_BEGIN: 0
  VALIDATE_ITERS: 10
  SEED: 1001
  IMG_H: 64
  IMG_W: 64
TEST:
  TYPE: test
  IMS_PER_BATCH: 96
  IMG_H: 64
  IMG_W: 64
DATA_LOADER:
  NUM_THREADS: 8
  IAMGE_PATH: ./data/hiero/IAM64-new
  STYLE_PATH: ./data/hiero/IAM64-new
  LAPLACE_PATH: ./data/hiero/IAM64_laplace
