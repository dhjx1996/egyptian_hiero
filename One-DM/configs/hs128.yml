MODEL:
  STYLE_ENCODER_LAYERS: 3
  NUM_IMGS: 15
  IN_CHANNELS: 4
  OUT_CHANNELS: 4
  NUM_RES_BLOCKS: 1
  NUM_HEADS: 4
  EMB_DIM: 512
SOLVER:
  BASE_LR: 0.0001
  EPOCHS: 1
  WARMUP_ITERS: 20000
  TYPE: AdamW
  GRAD_L2_CLIP: 5.0
TRAIN:
  TYPE: train
  IMS_PER_BATCH: 16
  SNAPSHOT_BEGIN: 100000
  SNAPSHOT_ITERS: 100000
  VALIDATE_BEGIN: 100000
  VALIDATE_ITERS: 100000
  SEED: 1001
  IMG_H: 128
  IMG_W: 128
TEST:
  TYPE: test
  IMS_PER_BATCH: 16
  IMG_H: 128
  IMG_W: 128
DATA_LOADER:
  NUM_THREADS: 4
  IAMGE_PATH: ./data/hs128/IAM64-new
  STYLE_PATH: ./data/hs64/IAM64-new
  LAPLACE_PATH: ./data/hs64/IAM64_laplace
